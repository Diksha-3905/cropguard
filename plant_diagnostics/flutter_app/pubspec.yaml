name: plant_diagnostics
description: Real-time multimodal plant disease diagnostics assistant with offline-first sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  http: ^1.2.0

  # Camera & Image
  image_picker: ^1.0.7

  # Local storage (offline queue) - plain sqflite, no code gen needed
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # Audio
  audioplayers: ^6.0.0

  # Networking & Connectivity
  connectivity_plus: ^5.0.2

  # State management
  flutter_riverpod: ^2.5.1

  # UI
  flutter_spinkit: ^5.2.0
  gap: ^3.0.1

  # Utils
  uuid: ^4.3.3
  logger: ^2.2.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
